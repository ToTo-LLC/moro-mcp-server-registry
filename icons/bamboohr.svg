<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#73C41D"/>
  <g transform="translate(14, 8)">
    <!-- Bamboo leaf/stalk shape -->
    <rect x="9" y="0" width="3" height="32" rx="1.5" fill="white"/>
    <!-- Left leaves -->
    <ellipse cx="5" cy="8" rx="6" ry="3" transform="rotate(-30 5 8)" fill="white" opacity="0.8"/>
    <ellipse cx="4" cy="18" rx="6" ry="3" transform="rotate(-20 4 18)" fill="white" opacity="0.8"/>
    <!-- Right leaves -->
    <ellipse cx="16" cy="12" rx="6" ry="3" transform="rotate(30 16 12)" fill="white" opacity="0.8"/>
    <ellipse cx="17" cy="24" rx="6" ry="3" transform="rotate(20 17 24)" fill="white" opacity="0.8"/>
  </g>
</svg>
