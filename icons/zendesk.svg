<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#03363D"/>
  <g transform="translate(10, 10)">
    <!-- Zendesk "Z" shape - simplified logo -->
    <polygon points="0,0 14,0 0,12" fill="white"/>
    <circle cx="7" cy="3.5" r="3.5" fill="white" opacity="0"/>
    <rect x="0" y="14" width="14" height="0.5" fill="white" opacity="0"/>
    <polygon points="14,16 0,28 14,28" fill="white"/>
    <circle cx="21" cy="24.5" r="3.5" fill="white"/>
    <polygon points="28,0 28,12 14,0" fill="white" opacity="0"/>
    <!-- Right side: mirrored -->
    <polygon points="14,0 28,0 28,12" fill="white"/>
    <circle cx="21" cy="3.5" r="3.5" fill="white" opacity="0"/>
    <polygon points="14,16 14,28 28,28" fill="white" opacity="0"/>
    <circle cx="7" cy="24.5" r="3.5" fill="white"/>
  </g>
</svg>
