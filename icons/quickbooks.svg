<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#2CA01C"/>
  <g transform="translate(8, 8)">
    <!-- QuickBooks circle with interleaved lines -->
    <circle cx="16" cy="16" r="14" fill="white" opacity="0.2"/>
    <circle cx="16" cy="16" r="12" fill="#2CA01C"/>
    <!-- Left vertical bar -->
    <rect x="10" y="8" width="3" height="16" rx="1.5" fill="white"/>
    <!-- Right vertical bar -->
    <rect x="19" y="8" width="3" height="16" rx="1.5" fill="white"/>
    <!-- Horizontal connector -->
    <rect x="10" y="14.5" width="12" height="3" rx="1.5" fill="white"/>
  </g>
</svg>
